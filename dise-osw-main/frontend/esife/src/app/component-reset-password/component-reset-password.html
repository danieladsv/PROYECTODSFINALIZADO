<section class="reset-container">

  <div class="reset-card">

    <h1>🔐 Cambiar contraseña</h1>

    <p class="texto-ayuda">
      Introduce tu nueva contraseña. Debe ser segura.
    </p>

    <input type="password" placeholder="Nueva contraseña" [(ngModel)]="nuevaPassword1">

    <input type="password" placeholder="Repetir nueva contraseña" [(ngModel)]="nuevaPassword2">

    <div *ngIf="mensajeError" class="mensaje-error">
      ⚠️ {{ mensajeError }}
    </div>

    <div *ngIf="mensajeOk" class="mensaje-ok">
      ✅ {{ mensajeOk }}
    </div>

    <button (click)="cambiarPassword()" [disabled]="cargando">
      {{ cargando ? 'Cambiando...' : 'Cambiar contraseña' }}
    </button>

  </div>

</section>
